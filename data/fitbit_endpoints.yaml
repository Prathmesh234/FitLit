google_health_api:
  base_url: https://health.googleapis.com
  version: v4
  status: current
  discovery: https://health.googleapis.com/$discovery/rest?version=v4
  user_placeholder: me
  naming: kebab-case in path (body-fat), snake_case in filters (body_fat)
  scopes:
    activity_and_fitness: https://www.googleapis.com/auth/googlehealth.activity_and_fitness
    activity_and_fitness_readonly: https://www.googleapis.com/auth/googlehealth.activity_and_fitness.readonly
    health_metrics_and_measurements: https://www.googleapis.com/auth/googlehealth.health_metrics_and_measurements
    health_metrics_and_measurements_readonly: https://www.googleapis.com/auth/googlehealth.health_metrics_and_measurements.readonly
    sleep_readonly: https://www.googleapis.com/auth/googlehealth.sleep.readonly
    nutrition_readonly: https://www.googleapis.com/auth/googlehealth.nutrition.readonly
    location_readonly: https://www.googleapis.com/auth/googlehealth.location.readonly
  resources:
    data_points:
      endpoints:
      - method: GET
        path: /v4/users/{user}/dataTypes/{dataType}/dataPoints
        op: list
      - method: POST
        path: /v4/users/{user}/dataTypes/{dataType}/dataPoints
        op: create
      - method: POST
        path: /v4/users/{user}/dataTypes/{dataType}/dataPoints:batchDelete
        op: batchDelete
      - method: POST
        path: /v4/users/{user}/dataTypes/{dataType}/dataPoints:rollUp
        op: rollUp
      - method: POST
        path: /v4/users/{user}/dataTypes/{dataType}/dataPoints:dailyRollUp
        op: dailyRollUp
      - method: POST
        path: /v4/users/{user}/dataTypes/{dataType}/dataPoints:reconcile
        op: reconcile
    notification_channels:
      endpoints:
      - op: create
      - op: delete
      - op: list
    operations:
      endpoints:
      - op: get
      - op: list
    data_sources:
      endpoints:
      - op: list
  data_types:
    activity_and_fitness:
    - activeZoneMinutes
    - activeMinutes
    - activityLevel
    - altitude
    - caloriesInHeartRateZone
    - dailyHeartRateZones
    - distance
    - exercise
    - floors
    - sedentaryPeriod
    - steps
    - timeInHeartRateZone
    - totalCalories
    - dailyVo2Max
    - runVo2Max
    - vo2Max
    - goals
    health_metrics_and_measurements:
    - bodyFat
    - weight
    - height
    - heartRate
    - dailyRestingHeartRate
    - heartRateVariability
    - dailyHeartRateVariability
    - oxygenSaturation
    - dailyOxygenSaturation
    - respiratoryRate
    - dailyRespiratoryRate
    - respiratoryRateSleepSummary
    - bloodGlucose
    - bodyTemperature
    - coreBodyTemperature
    - dailySleepTemperatureDerivations
    - ecgMeasurement
    - ecgRhythmClassification
    - afibAnalysisWindow
    sleep:
    - sleep
    - sleepSummary
    nutrition:
    - nutritionLog
    - hydrationLog
    location:
    - location
